<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0095bb"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#eef3ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0095bb" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff" rx="40"/>
  <ellipse cx="200" cy="200" rx="185" ry="185" fill="url(#bgGlow)"/>

  <!-- Decorative dots -->
  <g opacity="0.15" fill="#6d28d9">
    <circle cx="45"  cy="45"  r="5"/>
    <circle cx="80"  cy="28"  r="3.5"/>
    <circle cx="28"  cy="90"  r="4"/>
    <circle cx="355" cy="45"  r="5"/>
    <circle cx="375" cy="90"  r="3.5"/>
    <circle cx="325" cy="28"  r="4"/>
    <circle cx="42"  cy="358" r="4.5"/>
    <circle cx="78"  cy="376" r="3"/>
    <circle cx="360" cy="355" r="4.5"/>
    <circle cx="330" cy="378" r="3"/>
  </g>

  <!--
    LOGO MARK — exact website path: M4 28 L16 4 L28 28 H20 L16 20 L12 28 H4 Z (32×32 box)
    Content: x:[4..28], y:[4..28] — 24×24 units.
    Target content size: 260×260px → scale = 260/24 ≈ 10.833
    Center in 400×400:
      content offset in box: 4×scale = 43.3
      translate so content center (x:16, y:16 in original × scale) lands at (200,200):
        translate_x = 200 − 16×10.833 = 200 − 173.3 = 26.7 ≈ 27
        translate_y = 200 − 16×10.833 = 27
  -->
  <g transform="translate(27, 27) scale(10.833)" filter="url(#shadow)">
    <path d="M4 28L16 4L28 28H20L16 20L12 28H4Z" fill="url(#logoGrad)"/>
  </g>
</svg>
